name: Build and Publish to Docker Hub

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Forzamos a que las acciones usen Node.js 24 para evitar el aviso de depreciación
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v4 ya es compatible, pero el aviso pide el opt-in manual

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6 # Actualizado a v6 para mejor soporte de Node 24
        with:
          context: .
          push: true
          tags: |
            metroveinte/gym-tracker:latest
            metroveinte/gym-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
