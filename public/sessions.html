<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sesiones - Gym Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav>
      <a href="/" class="nav-link">Inicio</a>
      <a href="/sessions" class="nav-link active">Sesiones</a>
      <a href="/stats" class="nav-link">Estadísticas</a>
    </nav>
  </header>
  <main class="container">
    <h1>Sesiones de Entrenamiento</h1>
    <div id="message" class="message hidden"></div>
    <section class="card">
      <h2>Agregar sesión</h2>
      <form id="session-form">
        <label>
          Fecha
          <input type="date" id="date" required />
        </label>
        <label>
          Ejercicio
          <input type="text" id="exercise" placeholder="Press de banca" required />
        </label>
        <label>
          Notas (Opcional)
          <textarea id="notes" rows="2" placeholder="Notas sobre la sesión"></textarea>
        </label>
      </form>

      <h3 style="margin-top: 30px; margin-bottom: 15px;">Series</h3>
      <div id="series-container">
        <p style="color: #999; text-align: center;">Agrega series a continuación</p>
      </div>

      <button type="button" id="add-series-btn" class="btn-secondary" style="margin-top: 15px;">+ AGREGAR SERIE</button>
      <button type="button" id="save-session-btn" class="btn-primary" style="margin-top: 20px;">GUARDAR SESIÓN</button>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2>Historial de entrenamientos</h2>
        <button id="export-button" class="secondary">Exportar CSV</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Ejercicio</th>
              <th>Series</th>
              <th>Reps</th>
              <th>Peso</th>
              <th>Notas</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="sessions-body">
            <tr><td colspan="7">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
