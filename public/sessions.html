<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sesiones - Gym Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav>
      <a href="/" class="nav-link">Inicio</a>
      <a href="/sessions" class="nav-link active">Sesiones</a>
      <a href="/stats" class="nav-link">Estadísticas</a>
    </nav>
  </header>
  <main class="container">
    <h1>Sesiones de Entrenamiento</h1>
    <div id="message" class="message hidden"></div>
    <section class="card">
      <h2>Agregar sesión</h2>
      <form id="session-form">
        <label>
          Fecha
          <input type="date" id="date" required />
        </label>
        <label>
          Notas (Opcional)
          <textarea id="notes" rows="2" placeholder="Notas sobre la sesión"></textarea>
        </label>
      </form>

      <h3 style="margin-top: 30px; margin-bottom: 15px;">Ejercicios</h3>
      <div id="exercises-container">
        <p style="color: #999; text-align: center;">Agrega ejercicios a continuación</p>
      </div>

      <div style="display:flex; gap:10px; margin-top:15px;">
        <button type="button" id="add-exercise-btn" class="btn-secondary" style="flex:1; margin-top:0;">+ AÑADIR EJERCICIO</button>
        <button type="button" id="manage-exercises-btn" class="btn-secondary gear-btn" title="Gestionar ejercicios">⚙</button>
      </div>
      <button type="button" id="save-session-btn" class="btn-primary" style="margin-top: 20px; width: 100%;">GUARDAR SESIÓN</button>
    </section>
  </main>

  <!-- Modal para agregar ejercicio -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="exercise-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Agregar Ejercicio</h2>
        <button type="button" class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <label>
          Seleccionar Ejercicio
          <div class="exercise-selector">
            <input id="exercise-input" type="text" placeholder="Buscar o escribir ejercicio" autocomplete="off" />
            <div id="exercise-dropdown" class="exercise-dropdown hidden"></div>
          </div>
        </label>

        <div id="first-serie-form" class="hidden" style="margin-top: 25px; padding-top: 25px; border-top: 1px solid #444;">
          <h3 style="margin-top: 0;">Primera Serie</h3>
          <label>
            Repeticiones
            <input type="number" id="first-reps" min="1" placeholder="Ej: 10" />
          </label>
          <label>
            Peso en kg (Opcional)
            <input type="number" id="first-weight" min="0" step="0.5" placeholder="Ej: 20" />
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="modal-cancel-btn" class="btn-secondary">Cancelar</button>
        <button type="button" id="modal-confirm-btn" class="btn-primary" disabled>Agregar</button>
      </div>
    </div>
  </div>

  <!-- Modal para gestionar ejercicios -->
  <div id="manage-modal-overlay" class="modal-overlay hidden"></div>
  <div id="manage-modal" class="modal hidden" style="max-width:650px;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Gestionar Ejercicios</h2>
        <button type="button" class="modal-close" id="manage-modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding:20px 25px;">
        <div style="position:relative; margin-bottom:12px;">
          <input id="manage-search" type="text" placeholder="Buscar o añadir ejercicio..." style="width:100%; margin-top:0;" autocomplete="off" />
          <div id="manage-add-dropdown" class="exercise-dropdown hidden"></div>
        </div>
        <div id="manage-add-group-row" style="display:none; gap:8px; margin-bottom:14px; align-items:center; flex-wrap:wrap; padding:12px; background:#222; border-radius:8px; border:1px solid #444;">
          <span id="manage-add-name-label" style="color:#fff; font-size:0.9rem; font-weight:600; flex:1 1 100%;"></span>
          <select id="manage-add-group-select" style="flex:1; min-width:150px; padding:8px 10px; border:2px solid #444; background:#1a1a1a; color:#fff; border-radius:8px; font-family:'Oswald',sans-serif; cursor:pointer; margin-top:0;">
            <option value="">Grupo muscular...</option>
          </select>
          <button type="button" id="manage-add-confirm-btn" class="btn-primary" style="margin:0; padding:8px 16px; width:auto;">Guardar</button>
          <button type="button" id="manage-add-cancel-btn" class="btn-secondary" style="margin:0; padding:8px 14px; width:auto;">Cancelar</button>
        </div>
        <div style="margin-bottom:16px;">
          <select id="manage-filter-group" class="period-select" style="width:100%; margin:0;">
            <option value="">Todos los grupos</option>
          </select>
        </div>
        <div id="manage-exercises-list" style="max-height:300px; overflow-y:auto;"></div>
      </div>
      <div class="manage-modal-footer">
        <button type="button" id="repair-db-btn" class="btn-repair">🔧 Reparar BD</button>
        <button type="button" id="restore-db-btn" class="btn-restore">⚠ Restaurar BD</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
