<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estadísticas - Gym Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav>
      <a href="/" class="nav-link">Inicio</a>
      <a href="/sessions" class="nav-link">Sesiones</a>
      <a href="/stats" class="nav-link active">Estadísticas</a>
    </nav>
  </header>
  <main class="container">
    <h1>Estadísticas de Entrenamiento</h1>
    <div class="card">
      <h2>Resumen</h2>
      <p>Total de sesiones: <span id="total-sessions">-</span></p>
      <p>Ejercicios únicos: <span id="unique-exercises">-</span></p>
      <p>Total de series: <span id="total-series">-</span></p>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <h2>Historial completo</h2>
        <button id="export-button" class="secondary">Exportar CSV</button>
      </div>

      <div class="table-container">
        <table class="stats-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Ejercicio</th>
              <th>Series</th>
              <th>Reps</th>
              <th>Peso</th>
              <th>Notas</th>
            </tr>
          </thead>
          <tbody id="sessions-body"></tbody>
        </table>
        <p id="no-records" style="display:none; color:#999; margin-top: 15px;">No hay sesiones registradas aún.</p>
      </div>
    </div>
  </main>
  <script src="stats.js"></script>
</body>
</html>
